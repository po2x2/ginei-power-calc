function parseNum(v){
 if(!v) return 0
 v=v.toUpperCase().replace(/,/g,'')
 if(v.endsWith('K')) return parseFloat(v)*1e3
 if(v.endsWith('M')) return parseFloat(v)*1e6
 if(v.endsWith('B')) return parseFloat(v)*1e9
 return parseFloat(v)
}
function parsePct(v){
 if(!v) return 0
 if(v.endsWith('%')) return parseFloat(v)/100

}

function mult(l){ return MULTS[l-1] }

function calc(){
 const level = parseInt(level.value)
 const stats = parseNum(stats.value)
 const totalP = 1 + parseFloat(buff.value||0)/100
 const totalF = parseNum(flat.value)

 const addStatV = parseFloat(addStat.value||0)
 const addLvlV = parseFloat(addLvl.value||0)
 const addP = parsePct(addBuff.value)

 const base = stats * mult(level)
 const total = base * totalP + totalF
 const after = (stats+addStatV) * mult(level+addLvlV) * (totalP + addP) + totalF

 out.textContent =
  "基礎: "+base.toFixed(0)+"\n"+
  "総戦力: "+total.toFixed(0)+"\n"+
  "強化後総戦力: "+after.toFixed(0)
}
